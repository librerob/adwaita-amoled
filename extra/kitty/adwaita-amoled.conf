# ─────────────────────────────────────────────────────────────────────────────
#  Theme: Adwaita-AMOLED  (revised v2)
# ─────────────────────────────────────────────────────────────────────────────
# Changelog from v1:
#   • color1 (normal red) #ff0000 → #ff3333
#     Pure saturated red on pure black OLED causes persistent afterimage and
#     eye fatigue in long sessions. #ff3333 still reads unambiguously as error
#     red (5.77:1) but removes the retina-burning quality of 100% R saturation.
#   • selection_background #1a1a1a → #1a2d4a
#     A neutral dark grey selection on pure black is nearly perceptually
#     invisible (1.21:1 luminance ratio). A blue-tinted background provides
#     chromatic contrast on OLED that pure-luminance metrics miss — especially
#     important since OLED pixel response to chromatic shifts is strong.
#   • All other values unchanged and verified.
# ─────────────────────────────────────────────────────────────────────────────

# ── Cursor ────────────────────────────────────────────────────────────────────
# @accent blue
cursor #387af2
# pure black behind cursor glyph
cursor_text_color #000000

# ── Mouse / URLs ───────────────────────────────────────────────────────────────
# link color — 9.90:1
url_color #01c1f1

# ── Tabs ──────────────────────────────────────────────────────────────────────
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        2
tab_bar_margin_width    0.0
tab_title_template      "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

active_tab_foreground   #ffffff
# @accent blue
active_tab_background   #387af2
# disabled/backdrop text — 11.54:1 on inactive bg
inactive_tab_foreground #c0c0c0
# surface_hover
inactive_tab_background #1a1a1a
tab_bar_background      #000000

# ── Core palette ──────────────────────────────────────────────────────────────
background            #000000
foreground            #ffffff

# Blue-tinted selection: chromatic contrast on OLED  [FIX v2]
selection_foreground  #ffffff
selection_background  #1a2d4a

# ── Normal colors ─────────────────────────────────────────────────────────────
# pure black (terminal fill)
color0  #000000
# error — softened from #ff0000; 5.77:1  [FIX v2]
color1  #ff3333
# success — 13.75:1
color2  #0aeea0
# warning — 10.64:1
color3  #f1ac00
# @accent blue — 5.23:1
color4  #387af2
# magenta (Doom One reference) — 7.13:1
color5  #c678dd
# link/cyan — 9.90:1
color6  #01c1f1
# primary fg — 21.00:1
color7  #ffffff

# ── Bright colors (bold text) ─────────────────────────────────────────────────
# surface_hover
color8  #1a1a1a
# brighter error — 6.16:1
color9  #ff4444
# brighter success — 16.39:1
color10 #4affc4
# brighter warning — 13.97:1
color11 #ffcc44
# @accent_hover — 6.36:1
color12 #4a8cf5
# brighter magenta — 10.33:1
color13 #e599ff
# bright cyan — 13.03:1
color14 #44ddff
# backdrop text — 20.78:1
color15 #fafafa

# ── Dim colors (faint/dim ANSI attribute) ──────────────────────────────────────
# Kitty supports dim0–dim7
# surface_card
dim0 #0f0f0f
# destructive bg — 4.22:1
dim1 #e00a0f
# dimmed success — 6.98:1
dim2 #00aa70
# dimmed warning — 5.40:1
dim3 #aa7800
# @accent_active — 4.29:1
dim4 #2d6be0
# dimmed magenta — 3.96:1 (dim; acceptable)
dim5 #8a55aa
# dimmed cyan — 5.12:1
dim6 #0a88aa
# disabled/backdrop — 11.54:1
dim7 #c0c0c0

# ── vi mode cursor (mirrors main cursor) ──────────────────────────────────────
vi_cursor_color      #387af2
vi_cursor_text_color #000000
