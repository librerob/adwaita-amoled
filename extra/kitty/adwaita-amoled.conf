# ─────────────────────────────────────────────
#  Theme: Adwaita-AMOLED (pure black bg)
# ─────────────────────────────────────────────

# ── Cursor ────────────────────────────────────

# accent blue
cursor #387af2
# pure black behind cursor text
cursor_text_color #000000

# ── Mouse ─────────────────────────────────────

# cyan (link color)
url_color #01c1f1

# ── Tabs (Adwaita-AMOLED style) ───────────────

tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        2
tab_bar_margin_width    0.0
tab_title_template      "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

active_tab_foreground   #ffffff
# accent blue
active_tab_background   #387af2
inactive_tab_foreground #c0c0c0
inactive_tab_background #1a1a1a
tab_bar_background      #000000


# ── Color Scheme: Adwaita-AMOLED ──────────────

background            #000000
foreground            #ffffff
selection_foreground  #ffffff
selection_background  #1a1a1a

# Normal colors
# pure black
color0 #000000
# error
color1 #ff0000
# success
color2 #0aeea0
# warning
color3 #f1ac00
# accent blue
color4 #387af2
# magenta
color5 #c678dd
# cyan (link)
color6 #01c1f1
# white
color7 #ffffff

# Bright colors
# surface_hover
color8 #1a1a1a
# brighter error
color9 #ff4444
# brighter success
color10 #4affc4
# brighter warning
color11 #ffcc44
# accent hover
color12 #4a8cf5
# brighter magenta
color13 #e599ff
# bright cyan
color14 #44ddff
# backdrop text
color15 #fafafa

# Dim colors (kitty supports dim0–dim7)
dim0 #0f0f0f
dim1 #e00a0f
dim2 #00aa70
dim3 #aa7800
dim4 #2d6be0
dim5 #8a55aa
dim6 #0a88aa
dim7 #c0c0c0

# vi mode cursor (same as main cursor)
vi_cursor_color #387af2
vi_cursor_text_color #000000
