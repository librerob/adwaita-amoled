# -----------------------------------------------------------------------------
# Colors — Adwaita-AMOLED
# -----------------------------------------------------------------------------
[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = '#000000'      # surface_bg — pure AMOLED black
foreground = '#ffffff'      # primary text color

[colors.cursor]
cursor = '#387af2'          # @accent — primary blue
text   = '#000000'          # background color behind cursor text

[colors.vi_mode_cursor]
cursor = '#387af2'          # @accent
text   = '#000000'

[colors.selection]
background = '#1a1a1a'      # surface_hover — subtle selection; white text gives 19.5:1
text       = '#ffffff'      # selected text color

[colors.search.matches]
background = '#0f0f0f'      # surface_card
foreground = '#387af2'      # @accent — 5.23:1 on surface_card

[colors.search.focused_match]
background = '#387af2'      # @accent — active selection uses accent
foreground = '#ffffff'      # white text on accent background

[colors.footer_bar]
background = '#000000'      # surface_bg
foreground = '#c0c0c0'      # disabled/backdrop text — 11.54:1

# Normal colors — mapped from theme UI elements
# All pass WCAG AA on #000000 background
[colors.normal]
black   = '#000000'         # pure black
red     = '#ff0000'         # error_color                    5.25:1
green   = '#0aeea0'         # success_color                 13.75:1
yellow  = '#f1ac00'         # warning_color                 10.64:1
blue    = '#387af2'         # @accent — primary blue         5.23:1
magenta = '#c678dd'         # no theme equivalent; Doom One  7.13:1
cyan    = '#01c1f1'         # link color (GTK *:link)         9.90:1  [was #0faaf0; swapped for
                            #   better blue/cyan distinction: #387af2↔#01c1f1 = 1.89:1 vs 1.53:1]
white   = '#ffffff'         # pure white                    21.00:1

# Bright colors — increased brightness for bold text (draw_bold_text_with_bright_colors)
[colors.bright]
black   = '#1a1a1a'         # surface_hover
red     = '#ff4444'         # brighter error                 6.16:1
green   = '#4affc4'         # brighter success              16.39:1
yellow  = '#ffcc44'         # brighter warning              13.97:1
blue    = '#4a8cf5'         # @accent_hover                  6.36:1
magenta = '#e599ff'         # no theme equivalent; Doom One 10.33:1
cyan    = '#44ddff'         # bright cyan                   13.03:1
white   = '#fafafa'         # backdrop text — slightly off-white

# Dim colors — used by apps that request dim/faint ANSI attribute
# Intentionally lower contrast; values are ~70–80% luminance of normals
[colors.dim]
black   = '#0f0f0f'         # surface_card
red     = '#e00a0f'         # destructive bg (GTK theme)     4.22:1  [was #aa0000 at 2.71:1]
green   = '#00aa70'         # dimmed success                 6.98:1
yellow  = '#aa7800'         # dimmed warning                 5.40:1
blue    = '#2d6be0'         # @accent_active (GTK theme)     4.29:1
magenta = '#8a55aa'         # no theme equivalent; dimmed    3.96:1
cyan    = '#0a88aa'         # dimmed cyan                    5.12:1
white   = '#c0c0c0'         # disabled/backdrop text        11.54:1

# -----------------------------------------------------------------------------
# Bell
# -----------------------------------------------------------------------------
[bell]
animation = "EaseOutExpo"
duration = 0
color = "#387af2"           # @accent — matches theme's accent color
