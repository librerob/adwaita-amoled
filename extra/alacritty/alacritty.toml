# -----------------------------------------------------------------------------
# Colors — Adwaita-AMOLED  (revised v2)
# -----------------------------------------------------------------------------
# Changelog from v1:
#   • normal.red  #ff0000 → #ff3333  (5.77:1; pure saturated red on black
#     causes eye-strain on OLED over long sessions — slight desaturation
#     keeps semantic meaning while removing the harsh glare)
#   • All other values unchanged; every entry verified below.
#
# Contrast ratios (WCAG relative-luminance, bg = #000000)
#   normal.black   #000000    0.00:1  (invisible by design — terminal fill)
#   normal.red     #ff3333    5.77:1  ✓
#   normal.green   #0aeea0   13.75:1  ✓
#   normal.yellow  #f1ac00   10.64:1  ✓
#   normal.blue    #387af2    5.23:1  ✓
#   normal.magenta #c678dd    7.13:1  ✓
#   normal.cyan    #01c1f1    9.90:1  ✓
#   normal.white   #ffffff   21.00:1  ✓
#   bright.black   #1a1a1a    1.21:1  (surface; intentionally dark)
#   bright.red     #ff4444    6.16:1  ✓
#   bright.green   #4affc4   16.39:1  ✓
#   bright.yellow  #ffcc44   13.97:1  ✓
#   bright.blue    #4a8cf5    6.36:1  ✓
#   bright.magenta #e599ff   10.33:1  ✓
#   bright.cyan    #44ddff   13.03:1  ✓
#   bright.white   #fafafa   20.78:1  ✓
#   dim.red        #e00a0f    4.22:1  ✓  (dim — intentionally lower)
#   dim.green      #00aa70    6.98:1  ✓
#   dim.yellow     #aa7800    5.40:1  ✓
#   dim.blue       #2d6be0    4.29:1  ✓
#   dim.magenta    #8a55aa    3.96:1  △  (dim — acceptable for faint attribute)
#   dim.cyan       #0a88aa    5.12:1  ✓
#   dim.white      #c0c0c0   11.54:1  ✓
# -----------------------------------------------------------------------------

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = '#000000'      # surface_bg — pure AMOLED black
foreground = '#ffffff'      # primary text

[colors.cursor]
cursor = '#387af2'          # @accent — primary blue
text   = '#000000'          # background behind cursor text

[colors.vi_mode_cursor]
cursor = '#387af2'          # @accent
text   = '#000000'

[colors.selection]
background = '#1a2d4a'      # blue-tinted selection; 1.52:1 vs bg — chromatic
text       = '#ffffff'      # 13.83:1 on selection bg

[colors.search.matches]
background = '#1a1200'      # warm dark bg for non-focused matches
foreground = '#f1ac00'      # warning yellow — 9.30:1 on match bg

[colors.search.focused_match]
background = '#387af2'      # @accent — active match
foreground = '#ffffff'      # 5.23:1 (inverted; bg is #387af2)

[colors.footer_bar]
background = '#000000'      # surface_bg
foreground = '#c0c0c0'      # disabled/backdrop text — 11.54:1

# Normal colors — mapped from Adwaita AMOLED semantic tokens
[colors.normal]
black   = '#000000'         # pure black (terminal fill)
red     = '#ff3333'         # error — softened from #ff0000; 5.77:1  [FIX v2]
green   = '#0aeea0'         # success — 13.75:1
yellow  = '#f1ac00'         # warning — 10.64:1
blue    = '#387af2'         # @accent — 5.23:1
magenta = '#c678dd'         # no Adwaita equivalent; Doom One reference — 7.13:1
cyan    = '#01c1f1'         # link color — 9.90:1
white   = '#ffffff'         # primary fg — 21.00:1

# Bright colors — rendered for bold text (draw_bold_text_with_bright_colors)
[colors.bright]
black   = '#1a1a1a'         # surface_hover
red     = '#ff4444'         # brighter error — 6.16:1
green   = '#4affc4'         # brighter success — 16.39:1
yellow  = '#ffcc44'         # brighter warning — 13.97:1
blue    = '#4a8cf5'         # @accent_hover — 6.36:1
magenta = '#e599ff'         # bright magenta — 10.33:1
cyan    = '#44ddff'         # bright cyan — 13.03:1
white   = '#fafafa'         # backdrop text — 20.78:1

# Dim colors — rendered for faint/dim ANSI attribute (~70-80% lum of normals)
[colors.dim]
black   = '#0f0f0f'         # surface_card
red     = '#e00a0f'         # destructive bg (GTK) — 4.22:1
green   = '#00aa70'         # dimmed success — 6.98:1
yellow  = '#aa7800'         # dimmed warning — 5.40:1
blue    = '#2d6be0'         # @accent_active — 4.29:1
magenta = '#8a55aa'         # dimmed magenta — 3.96:1 (dim; acceptable)
cyan    = '#0a88aa'         # dimmed cyan — 5.12:1
white   = '#c0c0c0'         # disabled/backdrop text — 11.54:1

# -----------------------------------------------------------------------------
# Bell
# -----------------------------------------------------------------------------
[bell]
animation = "EaseOutExpo"
duration  = 0
color     = "#387af2"       # @accent
